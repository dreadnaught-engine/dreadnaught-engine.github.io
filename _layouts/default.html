<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
      /* Cosmos & Deep Void Background */
      body {
        background-color: #050914; 
        background: radial-gradient(circle at top center, #0a1128 0%, #02040a 100%);
        color: #c4d4e6; /* Starlight text */
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      
      /* The Header Area with Image */
      .dreadnaught-header {
        text-align: center;
        padding: 70px 0 50px 0;
        background-color: #02040a;
        background-image: url('/assets/images/header_background.png');
        background-size: cover;
        background-position: center;
        border-bottom: 2px solid #00ff66; /* Nature/Bioluminescent green border */
        position: relative;
      }

      /* Dark Tint Overlay (Ensures text is readable over complex images) */
      .dreadnaught-header::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(2, 4, 10, 0.65); 
        z-index: 1;
      }

      /* Orbitron Font + Nebula Glow */
      .dreadnaught-logo {
        font-family: 'Orbitron', sans-serif;
        font-size: 4.5rem;
        font-weight: 900;
        color: #d600ff; /* Nebula Magenta */
        text-shadow: 0px 0px 15px rgba(214, 0, 255, 0.8), 3px 3px 0px #000;
        margin: 0;
        letter-spacing: 4px;
        position: relative; 
        z-index: 2; /* Keeps text above the dark overlay */
      }

      /* Sleek Rajdhani Navigation Bar */
      .nav-bar {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        background-color: rgba(10, 16, 36, 0.95);
        padding: 12px;
        border-bottom: 1px solid #1a2b4c;
        box-shadow: 0px 4px 20px rgba(0, 255, 102, 0.1); 
        margin-bottom: 40px;
        gap: 8px;
      }

      .nav-item {
        color: #8ab4f8;
        text-decoration: none;
        text-transform: uppercase;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        padding: 8px 20px;
        background-color: #0d152b;
        border: 1px solid #14203d;
        border-top: 1px solid #233761;
        border-radius: 2px;
        transition: all 0.2s ease;
        letter-spacing: 1px;
      }

      /* Nature/Sci-Fi Hover State */
      .nav-item:hover {
        color: #000000; /* Dark text for contrast */
        background-color: #00ff66; /* Biosphere Green */
        border-color: #00ff66;
        box-shadow: 0px 0px 12px rgba(0, 255, 102, 0.6);
        cursor: pointer;
      }

      /* Core Content Container */
      .content-wrapper {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 20px;
        padding-bottom: 50px;
      }
      
      /* Make markdown links match the theme */
      .content-wrapper a {
        color: #00ff66;
        text-decoration: none;
      }
      .content-wrapper a:hover {
        text-decoration: underline;
      }
      /* --- ROADMAP ACCORDION STYLES --- */
.roadmap-container {
  margin-top: 30px;
}

.roadmap-part-title {
  color: #00ff66; /* Biosphere Green */
  border-bottom: 1px solid #1a2b4c;
  padding-bottom: 5px;
  margin-top: 40px;
  font-family: 'Rajdhani', sans-serif;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* The native HTML5 accordion */
.roadmap-item {
  background-color: #0a1128;
  border: 1px solid #14203d;
  border-left: 4px solid #333; /* Default left border */
  margin-bottom: 10px;
  border-radius: 3px;
  overflow: hidden;
}

.roadmap-item summary {
  padding: 15px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: #8ab4f8;
  background-color: #0d152b;
  list-style: none; /* Hides default triangle */
  display: flex;
  align-items: center;
  transition: background-color 0.2s;
}

.roadmap-item summary::-webkit-details-marker {
  display: none; /* Hides triangle in Safari/Chrome */
}

.roadmap-item summary:hover {
  background-color: #14203d;
}

/* The expanded content */
.item-content {
  padding: 20px;
  background-color: rgba(2, 4, 10, 0.8);
  border-top: 1px solid #14203d;
  font-family: Arial, sans-serif;
  color: #c4d4e6;
  line-height: 1.6;
}

.item-id {
  color: #555;
  margin-right: 15px;
  font-family: monospace;
}

/* --- DYNAMIC STATUS SYSTEM --- */
.status-icon {
  margin-right: 15px;
  font-family: monospace;
  font-weight: bold;
  font-size: 1.4rem;
}

/* 1. Pending Status */
.status-pending { border-left-color: #555; }
.status-pending summary .status-icon::before { 
  content: "○"; 
  color: #555; 
}

/* 2. Complete Status */
.status-complete { border-left-color: #00ff66; }
.status-complete summary .status-icon::before { 
  content: "☑"; 
  color: #00ff66; 
}
.status-complete summary .item-name {
  color: #a0a0a0;
  text-decoration: line-through; /* Crosses out finished items */
}

/* 3. Blocked / Revisit Status */
.status-blocked { border-left-color: #d600ff; }
.status-blocked summary .status-icon::before { 
  content: "⊟"; /* Minus box */
  color: #d600ff; 
}

/* Button to read blog post */
.btn-read-more {
  display: inline-block;
  margin-top: 15px;
  padding: 5px 10px;
  background-color: #1a2b4c;
  color: #00ff66 !important;
  border: 1px solid #00ff66;
  text-transform: uppercase;
  font-size: 0.8rem;
  font-weight: bold;
}
.btn-read-more:hover {
  background-color: #00ff66;
  color: #000 !important;
  text-decoration: none !important;
}
    </style>
  </head>
  
  <body>
    <div class="dreadnaught-header">
      <h1 class="dreadnaught-logo">DREADNAUGHT</h1>
    </div>

    <div class="nav-bar">
      <a href="/" class="nav-item">Home</a>
      <a href="/roadmap" class="nav-item">Roadmap</a>
      <a href="/devlog" class="nav-item">Devlog</a>
      <a href="/systems" class="nav-item">Systems</a>
      <a href="/architecture" class="nav-item">Architecture</a>
      <a href="/status" class="nav-item">Status</a>
      <a href="/notes" class="nav-item">Notes</a>
    </div>

    <div class="content-wrapper">
      <section id="main_content">
        {{ content }}
      </section>
    </div>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: 'base',
        themeVariables: {
          primaryColor: '#0a1128',
          primaryTextColor: '#c4d4e6',
          primaryBorderColor: '#8ab4f8',
          lineColor: '#00ff66',
          secondaryColor: '#14203d',
          tertiaryColor: '#050914'
        }
      });
    </script>
  </body>
</html>
